<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Overhead light cone -->
    <radialGradient id="light" cx="50%" cy="15%" r="50%">
      <stop offset="0%" stop-color="rgba(60,55,40,.35)"/>
      <stop offset="40%" stop-color="rgba(20,18,12,.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <!-- Vignette -->
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,.7)"/>
    </radialGradient>
  </defs>

  <!-- Back wall -->
  <rect width="800" height="600" fill="#0c0c14"/>
  <!-- Wall texture - subtle concrete -->
  <rect width="800" height="420" fill="#10101a"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="#1a1a28" stroke-width="2"/>

  <!-- Floor - perspective lines -->
  <polygon points="0,420 800,420 800,600 0,600" fill="#080810"/>
  <line x1="200" y1="420" x2="0" y2="600" stroke="#111120" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="420" x2="400" y2="600" stroke="#111120" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="420" x2="800" y2="600" stroke="#111120" stroke-width="1" opacity="0.4"/>
  <!-- Floor horizontal lines for depth -->
  <line x1="0" y1="470" x2="800" y2="470" stroke="#111120" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="530" x2="800" y2="530" stroke="#111120" stroke-width="1" opacity="0.15"/>

  <!-- Table (interrogation table, seen from detective's side) -->
  <rect x="200" y="400" width="400" height="8" rx="2" fill="#1a1a24" stroke="#252530" stroke-width="1"/>
  <rect x="210" y="408" width="4" height="40" fill="#151520"/>
  <rect x="586" y="408" width="4" height="40" fill="#151520"/>

  <!-- Chair (suspect's chair, behind table) -->
  <rect x="360" y="340" width="80" height="6" rx="2" fill="#181822" stroke="#222230" stroke-width="1"/>
  <rect x="370" y="280" width="60" height="60" rx="3" fill="#141420" stroke="#1e1e2e" stroke-width="1"/>
  <rect x="368" y="346" width="4" height="30" fill="#12121c"/>
  <rect x="428" y="346" width="4" height="30" fill="#12121c"/>

  <!-- Hanging lamp -->
  <line x1="400" y1="0" x2="400" y2="50" stroke="#333" stroke-width="1"/>
  <polygon points="380,50 420,50 430,60 370,60" fill="#222230" stroke="#333" stroke-width="1"/>
  <!-- Lamp glow -->
  <ellipse cx="400" cy="62" rx="20" ry="4" fill="#554a30" opacity="0.6"/>

  <!-- Light cone overlay -->
  <rect width="800" height="600" fill="url(#light)"/>

  <!-- Mirror / one-way glass hint on back wall -->
  <rect x="280" y="80" width="240" height="140" rx="2" fill="#0a0a12" stroke="#1a1a28" stroke-width="2"/>
  <rect x="282" y="82" width="236" height="136" rx="1" fill="none" stroke="#15152a" stroke-width="1"/>
  <text x="400" y="155" text-anchor="middle" fill="#15152a" font-family="Courier New,monospace" font-size="9" letter-spacing="3">ESPEJO UNIDIRECCIONAL</text>

  <!-- Vignette overlay -->
  <rect width="800" height="600" fill="url(#vig)"/>

  <!-- Subtle grain texture -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="multiply"/>
  </filter>
  <rect width="800" height="600" fill="transparent" opacity="0.03" filter="url(#grain)"/>
</svg>
